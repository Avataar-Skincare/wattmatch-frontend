name: Build

on:
  push:
    tags:
      - 'v*' # production
      - 't*' # test

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Set build env vars (prod)
        if: startsWith(github.ref_name, 'v')
        run: |
          echo "VITE_API_URL=${{ secrets.PROD_API_URL }}" >> $GITHUB_ENV

      - name: Set build env vars (test)
        if: startsWith(github.ref_name, 't')
        run: |
          echo "VITE_API_URL=${{ secrets.TEST_API_URL }}" >> $GITHUB_ENV

      - name: Build
        run: npm run build

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Upload build artifact to S3
        run: aws s3 sync ./dist s3://${{ secrets.S3_BUILD_BUCKET }}/${{ github.repository }}/${{ github.ref_name }}
