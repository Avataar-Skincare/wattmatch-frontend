name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        type: choice
        options:
          - test
          - prod

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Resolve deploy folder
        id: vars
        run: |
          if [ "${{ inputs.environment }}" = "prod" ]; then
            echo "folder=wattmatch" >> $GITHUB_OUTPUT
          else
            echo "folder=test-wattmatch" >> $GITHUB_OUTPUT
          fi

      - name: Sync build artifact to UI bucket
        run: |
          aws s3 sync s3://${{ secrets.S3_BUILD_BUCKET }}/${{ github.repository }}/${{ github.ref_name }} \
            s3://${{ secrets.S3_UI_BUCKET }}/${{ steps.vars.outputs.folder }} --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ inputs.environment == 'prod' && secrets.CLOUDFRONT_DISTRIBUTION_ID_PROD || secrets.CLOUDFRONT_DISTRIBUTION_ID_TEST }} \
            --paths "/*"
