# Deploys the static Vite build in `dist/` to S3, fronted by CloudFront.
# Anyone with push access to main can deploy - no AWS access needed; the
# workflow authenticates with a scoped IAM user (wattmatch-deploy).
#
# Required repo configuration:
#   Secrets:
#     AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY - access key of wattmatch-deploy
#   Variables:
#     S3_BUCKET                    - target S3 bucket name
#     CLOUDFRONT_DISTRIBUTION_ID   - CloudFront distribution ID to invalidate
#     VITE_API_URL                 - site origin baked into the build (forms
#                                    silently no-op in demo mode if unset)

name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Require VITE_API_URL
        run: test -n "${{ vars.VITE_API_URL }}"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - run: aws s3 sync dist "s3://${{ vars.S3_BUCKET }}" --delete

      - run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
